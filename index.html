<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Recibos de Sueldo</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <h2>Inicia sesión en mi página</h2>

    <div id="g_id_onload"
         data-client_id="419208057363-k4fimfm79l5e4odst7gdnil5s8e4tl9s.apps.googleusercontent.com"
         data-callback="manejarLogin"
         data-auto_prompt="false">
    </div>

    <!-- 1. PANTALLA DE LOGIN -->
    <section id="login-screen" class="container">
        <h1>Tecnologías del Atlántico S.A.</h1>
        <h2>Portal de Recibos de Sueldo</h2>
        <p>Inicie sesión para consultar su información confidencial.</p>
        
        <div id="buttonDiv" 
             class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="outline"
             data-size="large"
             data-text="signin_with">
        </div>
    </section>

    <!-- 2. PANTALLA DEL PANEL -->
    <section id="dashboard-screen" class="container hidden">
        <header class="dashboard-header">
            <h2>Panel del Empleado</h2>
            <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
        </header>
        
        <div class="employee-card">
            <h3>Mis Datos Personales</h3>
            <p><strong>ID Empleado:</strong> <span id="emp-id">-</span></p>
            <p><strong>Nombre:</strong> <span id="emp-name">-</span></p>
            <p><strong>Apellido:</strong> <span id="emp-lastname">-</span></p>
            <p><strong>Correo Electrónico:</strong> <span id="emp-email">-</span></p>
            <p><strong>Sueldo Actual:</strong> $<span id="emp-salary">-</span></p>
        </div>
    </section>

    <script src="funcion.js"></script>
</body>
</html>
